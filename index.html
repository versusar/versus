/* === VERSUS v3 — Full Stylesheet === */
:root {
–bg: #FFF5E1; –card: #FFFFFF; –primary: #FF6B35; –secondary: #7B2FF7;
–accent: #00D4AA; –pink: #FF3CAC; –yellow: #FFD93D; –dark: #1A1A2E;
–gray: #94A3B8;
–grad-a: linear-gradient(135deg, #FF6B35, #FF3CAC);
–grad-b: linear-gradient(135deg, #7B2FF7, #00D4AA);
–font-display: ‘Bricolage Grotesque’, sans-serif;
–font-body: ‘DM Sans’, sans-serif;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow-x:hidden; background:var(–bg); font-family:var(–font-display); -webkit-font-smoothing:antialiased; }
  #app { min-height:100vh; min-height:100dvh; max-width:480px; margin:0 auto; position:relative; }

/* === Animations === */
@keyframes popIn { 0%{transform:scale(0) rotate(-20deg);opacity:0;} 60%{transform:scale(1.2) rotate(5deg);} 100%{transform:scale(1) rotate(0);opacity:1;} }
@keyframes slideUp { from{transform:translateY(40px);opacity:0;} to{transform:translateY(0);opacity:1;} }
@keyframes slideIn { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }
@keyframes fadeIn { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
@keyframes growBar { from{width:0%;} }
@keyframes popBounce { 0%{transform:scale(.8);opacity:0;} 60%{transform:scale(1.05);} 100%{transform:scale(1);opacity:1;} }
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
@keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
@keyframes xpFloat { 0%{transform:translateY(0);opacity:1;} 100%{transform:translateY(-60px);opacity:0;} }
@keyframes achievePop { 0%{transform:translateY(100px) scale(.8);opacity:0;} 20%{transform:translateY(-10px) scale(1.05);opacity:1;} 30%{transform:translateY(0) scale(1);} 80%{transform:translateY(0) scale(1);opacity:1;} 100%{transform:translateY(-40px);opacity:0;} }
@keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(255,107,53,.3);} 50%{box-shadow:0 0 40px rgba(255,107,53,.6);} }
@keyframes slideDown { from{transform:translateY(-20px);opacity:0;} to{transform:translateY(0);opacity:1;} }

/* === Splash === */
.splash { height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#FF6B35 0%,#FF3CAC 40%,#7B2FF7 70%,#00D4AA 100%);padding:env(safe-area-inset-top) 0 0; }
.splash-icon { animation:popIn .8s ease-out forwards;font-size:72px;margin-bottom:8px; }
.splash-title { animation:popIn .8s ease-out .2s both;font-size:52px;font-weight:800;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,.2);letter-spacing:-2px; }
.splash-sub { animation:slideUp .6s ease-out .6s both;color:rgba(255,255,255,.9);font-size:16px;font-family:var(–font-body);font-weight:500;margin-top:12px; }
.splash-loader { animation:pulse 1.5s ease-in-out infinite 1.2s;margin-top:40px;width:32px;height:32px;border-radius:50%;border:3px solid rgba(255,255,255,.5); }

/* === Home === */
.home { min-height:100vh;min-height:100dvh;background:var(–bg);padding-bottom:40px; }
.home-header { background:linear-gradient(135deg,#FF6B35,#FF3CAC,#7B2FF7);padding:48px 24px 28px;border-radius:0 0 32px 32px;text-align:center;padding-top:calc(48px + env(safe-area-inset-top)); }
.home-header h1 { font-size:36px;font-weight:800;color:#fff;letter-spacing:-1.5px; }
.home-header p { color:rgba(255,255,255,.85);font-family:var(–font-body);font-size:14px;margin-top:4px; }

/* Level Card */
.level-card { background:rgba(255,255,255,.15);border-radius:16px;padding:12px 16px;margin-top:14px;backdrop-filter:blur(10px); }
.level-top { display:flex;justify-content:space-between;align-items:center;margin-bottom:8px; }
.level-badge { font-size:14px;font-weight:800;color:#fff; }
.level-label { font-size:12px;font-weight:700;color:rgba(255,255,255,.7);font-family:var(–font-body); }
.xp-bar-track { height:6px;background:rgba(255,255,255,.2);border-radius:6px;overflow:hidden; }
.xp-bar-fill { height:100%;background:var(–yellow);border-radius:6px;transition:width .5s ease; }
.xp-bar-label { font-size:10px;color:rgba(255,255,255,.6);font-family:var(–font-body);margin-top:4px;text-align:right; }

.stats-row { display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap; }
.stat-pill { background:rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;color:#fff;font-size:12px;font-family:var(–font-body);font-weight:700; }

/* Nav Pills */
.nav-pill { flex:1;padding:12px;border:2px solid var(–dark);border-radius:16px;background:var(–card);color:var(–dark);font-size:13px;font-weight:700;font-family:var(–font-body);cursor:pointer;text-align:center; }
.nav-pill:active { transform:scale(.97); }

/* Daily Button */
.daily-btn { width:100%;padding:22px;border:none;border-radius:24px;background:linear-gradient(135deg,#FFD93D 0%,#FF6B35 50%,#FF3CAC 100%);background-size:200% 200%;animation:shimmer 3s ease-in-out infinite;cursor:pointer;text-align:left;position:relative;overflow:hidden; }
.daily-btn .label { font-size:11px;font-weight:800;color:rgba(255,255,255,.9);text-transform:uppercase;letter-spacing:2px;font-family:var(–font-body); }
.daily-btn .title { font-size:20px;font-weight:800;color:#fff;margin-top:4px; }
.daily-btn .desc { font-size:12px;font-family:var(–font-body);color:rgba(255,255,255,.85);margin-top:2px; }
.daily-btn .arrow { position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:28px;color:#fff; }

.section-title { font-size:18px;font-weight:800;color:var(–dark);margin:0 0 14px 4px; }
.cat-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
.cat-card { border:none;border-radius:20px;padding:20px 14px;cursor:pointer;text-align:left;transition:transform .15s;box-shadow:0 4px 16px rgba(0,0,0,.08); }
.cat-card:active { transform:scale(.95); }
.cat-card .emoji { font-size:26px; }
.cat-card .name { font-size:13px;font-weight:700;color:#fff;margin-top:5px; }
.cat-card .count { font-size:10px;font-family:var(–font-body);color:rgba(255,255,255,.8);margin-top:2px; }
.footer { text-align:center;margin-top:32px;font-family:var(–font-body);font-size:11px;color:var(–gray); }

/* === Game === */
.game { min-height:100vh;min-height:100dvh;background:var(–bg);display:flex;flex-direction:column; }
.top-bar { display:flex;align-items:center;justify-content:space-between;padding:14px 20px 6px;padding-top:calc(14px + env(safe-area-inset-top)); }
.back-btn { background:none;border:none;font-size:24px;cursor:pointer;padding:4px;color:var(–dark); }
.top-right { display:flex;align-items:center;gap:6px; }
.streak-badge { font-size:11px;font-family:var(–font-body);font-weight:700;color:var(–dark);background:var(–yellow);border-radius:20px;padding:3px 10px; }
.xp-badge { font-size:11px;font-family:var(–font-body);font-weight:700;color:#fff;background:var(–secondary);border-radius:20px;padding:3px 10px; }
.q-counter { font-size:11px;font-family:var(–font-body);color:var(–gray); }

.progress-track { margin:0 20px;height:4px;background:#E8E0D4;border-radius:4px;overflow:hidden; }
.progress-fill { height:100%;background:var(–grad-a);border-radius:4px;transition:width .5s ease; }
.cat-pill { display:inline-block;font-size:10px;font-weight:700;font-family:var(–font-body);color:var(–secondary);background:rgba(123,47,247,.1);padding:3px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:1px; }

.question-area { flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 20px; }
.question-text { animation:slideIn .4s ease-out;font-size:24px;font-weight:800;color:var(–dark);text-align:center;line-height:1.25;margin-bottom:28px;letter-spacing:-.5px; }

.option-btn { position:relative;width:100%;padding:22px;border:3px solid transparent;border-radius:20px;cursor:pointer;font-size:17px;font-weight:700;font-family:var(–font-display);text-align:left;overflow:hidden;transition:all .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.08); }
.option-btn:active:not(:disabled) { transform:scale(.97); }
.option-btn:disabled { cursor:default; }
.option-btn.a { animation:slideIn .4s ease-out .1s both;background:var(–grad-a);color:#fff; }
.option-btn.b { animation:slideIn .4s ease-out .2s both;background:var(–grad-b);color:#fff; }
.option-btn.a.voted { background:var(–card);color:var(–dark);padding:18px; }
.option-btn.b.voted { background:var(–card);color:var(–dark);padding:18px; }
.option-btn.a.selected { border-color:var(–primary);box-shadow:0 4px 20px rgba(255,107,53,.3); }
.option-btn.b.selected { border-color:var(–secondary);box-shadow:0 4px 20px rgba(123,47,247,.3); }

.result-bar { position:absolute;top:0;left:0;height:100%;animation:growBar .8s ease-out;border-radius:17px;opacity:.15; }
.result-bar.a { background:var(–grad-a); }
.result-bar.b { background:var(–grad-b); }
.option-inner { position:relative;display:flex;justify-content:space-between;align-items:center; }
.pct { animation:popBounce .4s ease-out .3s both;font-weight:800;font-size:20px; }
.pct.a { color:var(–primary); }
.pct.b { color:var(–secondary); }
.vs-divider { text-align:center;font-size:13px;font-weight:800;color:var(–gray);margin:5px 0;letter-spacing:2px; }

.actions { animation:slideIn .4s ease-out .3s both;display:flex;gap:10px;margin-top:20px; }
.share-btn { flex:1;padding:12px;border:2px solid var(–dark);border-radius:16px;background:transparent;color:var(–dark);font-size:13px;font-weight:700;font-family:var(–font-body);cursor:pointer; }
.next-btn { flex:1;padding:12px;border:none;border-radius:16px;background:var(–grad-a);color:#fff;font-size:13px;font-weight:700;font-family:var(–font-body);cursor:pointer; }
.next-btn:active { transform:scale(.97); }
.result-note { animation:popBounce .5s ease-out .5s both;text-align:center;margin-top:12px;font-size:12px;font-family:var(–font-body);color:var(–gray); }

/* === XP Toast === */
.xp-toast { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);animation:xpFloat 2s ease-out forwards;pointer-events:none;z-index:100;text-align:center; }
.xp-amount { font-size:28px;font-weight:800;color:var(–primary);text-shadow:0 2px 10px rgba(255,107,53,.4);font-family:var(–font-display); }
.levelup-burst { font-size:24px;font-weight:800;color:var(–yellow);text-shadow:0 2px 20px rgba(255,217,61,.6);animation:pulse 1s ease-in-out infinite; }

/* === Achievement Toast === */
.achievement-toast { position:fixed;bottom:40px;left:50%;transform:translateX(-50%);animation:achievePop 3s ease-out forwards;background:linear-gradient(135deg,var(–dark),#2D2D4E);border:2px solid var(–yellow);border-radius:20px;padding:16px 24px;text-align:center;z-index:100;min-width:260px;box-shadow:0 8px 30px rgba(0,0,0,.3); }

/* === Stats === */
.stat-card { background:var(–card);border-radius:16px;padding:14px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06); }
.stat-num { font-size:22px;font-weight:800;color:var(–dark); }
.stat-label { font-size:10px;font-weight:600;color:var(–gray);font-family:var(–font-body);margin-top:2px;text-transform:uppercase;letter-spacing:.5px; }

/* === Badges === */
.badge-card { background:var(–card);border-radius:16px;padding:14px 8px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06); }
.badge-card.unlocked { border:2px solid var(–yellow);animation:glow 2s ease-in-out infinite; }
.badge-card.locked { opacity:.7; }
.badge-name { font-size:11px;font-weight:700;color:var(–dark);margin-top:4px; }
.badge-desc { font-size:9px;font-family:var(–font-body);color:var(–gray);margin-top:2px; }

/* === Paywall === */
.paywall-btn { display:block;width:100%;max-width:320px;padding:14px;border-radius:16px;font-size:14px;font-weight:700;font-family:var(–font-body);cursor:pointer;margin-bottom:10px;transition:transform .15s; }
.paywall-btn:active { transform:scale(.97); }
.paywall-btn.primary { border:none;background:var(–grad-a);color:#fff; }
.paywall-btn.secondary { border:2px solid var(–dark);background:var(–card);color:var(–dark); }
.paywall-btn.ghost { border:none;background:transparent;color:var(–gray); }

/* === Ad Slot === */
.ad-container { background:var(–card);border:2px dashed var(–gray);border-radius:20px;padding:32px 24px;width:100%;max-width:320px;text-align:center; }
.ad-label { font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(–gray);font-family:var(–font-body);margin-bottom:12px; }
.ad-content { }

  </style>
</head>

  }
}

function getRegionKeys() { return Object.keys(REGIONS); }

function getRegionalQuestions(regionKey) {
  const qs = REGIONS[regionKey] || [];
  return qs.map(q => ({ ...q, category: regionKey }));
}

function getAllWithRegion(regionKey) {
  return [...ALL_QUESTIONS, ...getRegionalQuestions(regionKey)];
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  get(k) { try { const v = localStorage.getItem(this.P + k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set(k, v) { try { localStorage.setItem(this.P + k, JSON.stringify(v)); } catch (e) { console.warn('Storage:', e); } },

  getProfile() {
    let p = this.get('profile');
    if (!p) {
      p = {
        id: 'user_' + Math.random().toString(36).substr(2, 9), created: Date.now(), username: '',
        xp: 0, level: 1, levelName: LEVELS[0].name, levelEmoji: LEVELS[0].emoji,
        streak: 0, bestStreak: 0, totalVotes: 0, lastVoteDate: null, shares: 0,
        majorityVotes: 0, minorityVotes: 0, nightVotes: 0, earlyVotes: 0,
        categoriesPlayed: 0, categoriesSet: [], regionsPlayed: 0,
        dailiesCompleted: 0, speedRounds: 0, achievements: [],
        dailyVotesToday: 0, dailyDate: null, bonusQuestions: 0
      };
      this.set('profile', p);
    }
    // Migration for older profiles
    if (p.username === undefined) p.username = '';
    if (p.achievements === undefined) p.achievements = [];
    if (p.dailyVotesToday === undefined) p.dailyVotesToday = 0;
    if (p.bonusQuestions === undefined) p.bonusQuestions = 0;
    return p;
  },

  updateProfile(u) { const p = this.getProfile(); Object.assign(p, u); this.set('profile', p); return p; },
  setUsername(n) { const p = this.getProfile(); p.username = n.trim().substring(0, 20); this.set('profile', p); return p; },

  addXP(amt) {
    const p = this.getProfile();
    p.xp += amt;
    let nl = 1;
    for (let i = LEVELS.length - 1; i >= 0; i--) { if (p.xp >= LEVELS[i].xp) { nl = i + 1; break; } }
    const up = nl > p.level;
    p.level = nl; p.levelName = LEVELS[nl - 1].name; p.levelEmoji = LEVELS[nl - 1].emoji;
    this.set('profile', p);
    return { xp: amt, totalXP: p.xp, level: nl, leveledUp: up, levelName: p.levelName, emoji: p.levelEmoji };
  },

  getLevelProgress() {
    const p = this.getProfile(), c = LEVELS[p.level - 1], n = LEVELS[p.level] || null;
    if (!n) return { progress: 100, label: 'MAX LEVEL' };
    const into = p.xp - c.xp, forLvl = n.xp - c.xp;
    return { progress: Math.min(100, Math.round((into / forLvl) * 100)), label: into + '/' + forLvl + ' XP' };
  },

  checkAchievements() {
    const p = this.getProfile(), newA = [];
    for (const [k, a] of Object.entries(ACHIEVEMENTS)) {
      if (!p.achievements.includes(k) && a.cond(p)) {
        p.achievements.push(k); newA.push({ key: k, ...a }); p.xp += XP_CONFIG.ACHIEVEMENT;
      }
    }
    if (newA.length > 0) this.set('profile', p);
    return newA;
  },

  getAchievements() {
    const p = this.getProfile();
    return Object.entries(ACHIEVEMENTS).map(([k, a]) => ({ key: k, ...a, unlocked: p.achievements.includes(k) }));
  },

  getDailyStatus() {
    const p = this.getProfile(), today = new Date().toDateString();
    if (p.dailyDate !== today) { p.dailyVotesToday = 0; p.dailyDate = today; this.set('profile', p); }
    const fl = Math.max(0, VERSUS_CONFIG.FREE_DAILY_QUESTIONS - p.dailyVotesToday + p.bonusQuestions);
    return {
      votesToday: p.dailyVotesToday, freeLeft: fl,
      shouldShowPaywall: p.dailyVotesToday >= VERSUS_CONFIG.FREE_DAILY_QUESTIONS && p.bonusQuestions <= 0,
      shouldShowAd: p.dailyVotesToday > 0 && p.dailyVotesToday % VERSUS_CONFIG.AD_EVERY_N_QUESTIONS === 0,
    };
  },

  incrementDailyVotes() {
    const p = this.getProfile(), today = new Date().toDateString();
    if (p.dailyDate !== today) { p.dailyVotesToday = 0; p.dailyDate = today; }
    p.dailyVotesToday++;
    if (p.dailyVotesToday > VERSUS_CONFIG.FREE_DAILY_QUESTIONS && p.bonusQuestions > 0) p.bonusQuestions--;
    this.set('profile', p);
  },

  addBonusQuestions(c) { const p = this.getProfile(); p.bonusQuestions = (p.bonusQuestions || 0) + c; this.set('profile', p); },
  getVotes() { return this.get('votes') || {}; },

  saveVote(qText, side, category, withMaj) {
    const votes = this.getVotes(); votes[qText] = { side, timestamp: Date.now() }; this.set('votes', votes);
    const p = this.getProfile(), today = new Date().toDateString(),
      lastDate = p.lastVoteDate ? new Date(p.lastVoteDate).toDateString() : null, hour = new Date().getHours();
    let streak = p.streak;
    if (lastDate === today) { /* same day */ }
    else if (lastDate === new Date(Date.now() - 86400000).toDateString()) streak++;
    else streak = 1;
    if (hour >= 0 && hour < 5) p.nightVotes = (p.nightVotes || 0) + 1;
    if (hour >= 5 && hour < 7) p.earlyVotes = (p.earlyVotes || 0) + 1;
    if (category && !p.categoriesSet.includes(category)) { p.categoriesSet.push(category); p.categoriesPlayed = p.categoriesSet.length; }
    if (withMaj === true) p.majorityVotes = (p.majorityVotes || 0) + 1;
    if (withMaj === false) p.minorityVotes = (p.minorityVotes || 0) + 1;
    this.updateProfile({
      totalVotes: p.totalVotes + 1, streak, bestStreak: Math.max(streak, p.bestStreak),
      lastVoteDate: Date.now(), nightVotes: p.nightVotes, earlyVotes: p.earlyVotes,
      categoriesSet: p.categoriesSet, categoriesPlayed: p.categoriesPlayed,
      majorityVotes: p.majorityVotes, minorityVotes: p.minorityVotes
    });
    this.incrementDailyVotes();
    let xpE = XP_CONFIG.VOTE + streak * XP_CONFIG.STREAK_BONUS;
    if (withMaj === false) xpE += XP_CONFIG.AGAINST_GRAIN;
    else if (withMaj === true) xpE += XP_CONFIG.MAJORITY;
    const xpR = this.addXP(xpE);
    const newA = this.checkAchievements();
    return { xpResult: xpR, newAchievements: newA, streak };
  },

  recordShare() {
    const p = this.getProfile(); p.shares = (p.shares || 0) + 1; this.set('profile', p);
    this.addXP(XP_CONFIG.SHARE); this.addBonusQuestions(VERSUS_CONFIG.SHARE_UNLOCK_BONUS);
    return this.checkAchievements();
  },

  hasVoted(q) { return (this.getVotes())[q] || null; },

  getVoteCounts(q, sA, sB) {
    const gv = this.get('globalVotes') || {}, qv = gv[q] || { a: 0, b: 0 },
      tA = sA + qv.a, tB = sB + qv.b, t = tA + tB;
    return { a: Math.round((tA / t) * 100), b: Math.round((tB / t) * 100), totalVotes: t };
  },

  addGlobalVote(q, side) {
    const gv = this.get('globalVotes') || {}; if (!gv[q]) gv[q] = { a: 0, b: 0 }; gv[q][side]++; this.set('globalVotes', gv);
  },

  reset() { Object.keys(localStorage).filter(k => k.startsWith(this.P)).forEach(k => localStorage.removeItem(k)); },
};

</script>

  ];
  const me = { name: p.username || 'You', xp: p.xp, level: p.level, ln: p.levelName, streak: p.bestStreak, votes: p.totalVotes, isMe: true };
  const all = [...fakeUsers, me].sort((a, b) => tab === 'streak' ? b.streak - a.streak : tab === 'votes' ? b.votes - a.votes : b.xp - a.xp);
  const rows = all.map((u, i) => {
    const rank = i + 1, medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    const val = tab === 'xp' ? u.xp + ' XP' : tab === 'streak' ? '🔥 ' + u.streak : u.votes;
    return `<div class="lb-row ${u.isMe ? 'me' : ''} ${rank <= 3 ? 'top3' : ''}"><div class="lb-rank">${medal}</div><div class="lb-info"><div class="lb-name">${u.name}${u.isMe ? ' (you)' : ''}</div><div class="lb-detail">Lv.${u.level} · ${u.ln}</div></div><div class="lb-xp">${val}</div></div>`;
  }).join('');

  app.innerHTML = `<div class="game" style="background:var(--bg);">
    <div class="top-bar"><div style="font-weight:800;font-size:18px;color:var(--dark);">🏆 Leaderboard</div></div>
    <div style="display:flex;gap:6px;padding:8px 20px;">
      <button class="lb-tab ${tab === 'xp' ? 'active' : ''}" data-tab="xp">⭐ XP</button>
      <button class="lb-tab ${tab === 'streak' ? 'active' : ''}" data-tab="streak">🔥 Streak</button>
      <button class="lb-tab ${tab === 'votes' ? 'active' : ''}" data-tab="votes">🗳 Votes</button>
    </div>
    <div style="padding:8px 20px;overflow-y:auto;flex:1;padding-bottom:80px;">${rows}</div>
    ${!p.username ? '<div style="padding:12px 20px;"><button class="next-btn" style="width:100%;padding:14px;" id="lbSetName">Set Username to Claim Your Rank</button></div>' : ''}
    ${bottomNav('leaderboard')}</div>`;
  $$('.lb-tab').forEach(t => t.addEventListener('click', () => { state.lbTab = t.dataset.tab; render(); }));
  const lsn = document.getElementById('lbSetName'); if (lsn) lsn.addEventListener('click', showUsernameModal);
  bindNav();
}

// === Profile ===
function renderProfile() {
  const p = VS.getProfile(), lp = VS.getLevelProgress();
  app.innerHTML = `<div class="game" style="background:var(--bg);">
    <div style="padding:16px 20px;overflow-y:auto;flex:1;padding-bottom:80px;">
    <div style="background:linear-gradient(135deg,#FF6B35,#FF3CAC,#7B2FF7);border-radius:24px;padding:24px;text-align:center;margin-bottom:20px;">
      <div style="font-size:48px;">${p.levelEmoji}</div>
      <div style="font-size:22px;font-weight:800;color:#fff;margin-top:4px;">${p.username || 'Anonymous'}</div>
      <div style="font-size:13px;color:rgba(255,255,255,.8);font-family:var(--font-body);">${p.levelName} · Level ${p.level}</div>
      <div style="background:rgba(255,255,255,.2);border-radius:20px;height:8px;margin:12px 20px 0;overflow:hidden;"><div style="height:100%;width:${lp.progress}%;background:#fff;border-radius:20px;"></div></div>
      <div style="font-size:11px;color:rgba(255,255,255,.7);font-family:var(--font-body);margin-top:6px;">${lp.label}</div>
      <button style="margin-top:12px;background:rgba(255,255,255,.25);border:none;border-radius:12px;padding:6px 16px;color:#fff;font-size:12px;font-weight:700;font-family:var(--font-body);cursor:pointer;" id="editName">${p.username ? 'Edit Username' : 'Set Username'}</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;">
      <div class="stat-card"><div class="stat-num">${p.totalVotes}</div><div class="stat-label">Votes</div></div>
      <div class="stat-card"><div class="stat-num">${p.xp}</div><div class="stat-label">XP</div></div>
      <div class="stat-card"><div class="stat-num">${p.bestStreak}</div><div class="stat-label">Best Streak</div></div>
      <div class="stat-card"><div class="stat-num">${p.majorityVotes || 0}</div><div class="stat-label">Mainstream</div></div>
      <div class="stat-card"><div class="stat-num">${p.minorityVotes || 0}</div><div class="stat-label">Contrarian</div></div>
      <div class="stat-card"><div class="stat-num">${p.categoriesPlayed || 0}/10</div><div class="stat-label">Categories</div></div>
    </div></div>${bottomNav('profile')}</div>`;
  $('#editName').addEventListener('click', showUsernameModal);
  bindNav();
}

// === Stats / Badges ===
function renderStats() {
  const achs = VS.getAchievements(), ul = achs.filter(a => a.unlocked), ll = achs.filter(a => !a.unlocked);
  app.innerHTML = `<div class="game" style="background:var(--bg);">
    <div style="padding:16px 20px;overflow-y:auto;flex:1;padding-bottom:80px;">
    <h2 style="font-size:20px;font-weight:800;color:var(--dark);margin-bottom:16px;">📊 Badges (${ul.length}/${achs.length})</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
      ${ul.map(a => `<div class="badge-card unlocked"><div style="font-size:28px;">${a.emoji}</div><div class="badge-name">${a.name}</div><div class="badge-desc">${a.desc}</div></div>`).join('')}
      ${ll.map(a => `<div class="badge-card locked"><div style="font-size:28px;filter:grayscale(1);opacity:.4;">🔒</div><div class="badge-name" style="opacity:.5;">${a.name}</div><div class="badge-desc" style="opacity:.4;">${a.desc}</div></div>`).join('')}
    </div></div>${bottomNav('stats')}</div>`;
  bindNav();
}

// === Game ===
function renderGame() {
  const q = state.questions[state.currentQ]; if (!q) { state.screen = 'home'; render(); return; }
  const p = VS.getProfile(), daily = VS.getDailyStatus();
  const prog = ((state.currentQ + (state.showResults ? 1 : 0)) / state.questions.length) * 100;
  if (daily.shouldShowPaywall && !state.showResults) { renderPaywall(); return; }
  if (daily.shouldShowAd && !state.showAd && !state.showResults && state.questionsAnsweredThisRound > 0 && state.questionsAnsweredThisRound % VERSUS_CONFIG.AD_EVERY_N_QUESTIONS === 0) { renderAdSlot(); return; }
  const pv = VS.hasVoted(q.q); if (pv && !state.selected) { state.selected = pv.side; state.showResults = true; }

  let oA = 'option-btn a', oB = 'option-btn b', bA = '', bB = '', pA = '', pB = '', acts = '', note = '', xpT = '', achT = '';
  if (state.showResults) {
    const c = VS.getVoteCounts(q.q, q.seed[0], q.seed[1]);
    oA += ' voted' + (state.selected === 'a' ? ' selected' : ''); oB += ' voted' + (state.selected === 'b' ? ' selected' : '');
    bA = `<div class="result-bar a" style="width:${c.a}%"></div>`; bB = `<div class="result-bar b" style="width:${c.b}%"></div>`;
    pA = `<span class="pct a">${c.a}%</span>`; pB = `<span class="pct b">${c.b}%</span>`;
    const wM = (c.a > c.b && state.selected === 'a') || (c.b > c.a && state.selected === 'b');
    acts = `<div class="actions"><button class="share-btn" id="shareBtn">📤 Share</button><button class="next-btn" id="nextBtn">${state.currentQ < state.questions.length - 1 ? 'Next →' : '🔄 Replay'}</button></div>`;
    note = `<div class="result-note">${wM ? "🎯 With the majority!" : "😈 Against the grain! +15 XP"}</div>`;
  }
  if (state.xpPopup) xpT = `<div class="xp-toast">${state.xpPopup.leveledUp ? `<div class="levelup-burst">🎉 LEVEL UP!</div><div style="font-size:18px;font-weight:800;color:#fff;margin-top:4px;">${state.xpPopup.emoji} ${state.xpPopup.levelName}</div>` : `<span class="xp-amount">+${state.xpPopup.xp} XP</span>`}</div>`;
  if (state.achievementPopup) achT = `<div class="achievement-toast"><div style="font-size:36px;">${state.achievementPopup.emoji}</div><div style="font-weight:800;color:#fff;font-size:14px;">Badge Unlocked!</div><div style="font-weight:700;color:var(--yellow);font-size:16px;">${state.achievementPopup.name}</div><div style="font-size:12px;color:rgba(255,255,255,.7);font-family:var(--font-body);">${state.achievementPopup.desc} · +100 XP</div></div>`;

  app.innerHTML = `<div class="game"><div class="top-bar"><button class="back-btn" id="backBtn">←</button><div class="top-right"><span class="streak-badge">🔥 ${p.streak}</span><span class="xp-badge">${p.levelEmoji} ${p.xp}</span><span class="q-counter">${state.currentQ + 1}/${state.questions.length}</span></div></div>
    <div class="progress-track"><div class="progress-fill" style="width:${prog}%"></div></div>
    <div style="text-align:center;margin-top:16px;"><span class="cat-pill">${q.category}</span></div>
    <div class="question-area"><h2 class="question-text">${q.q}</h2>
    <button class="${oA}" id="optA" ${state.showResults ? 'disabled' : ''}>${bA}<div class="option-inner"><span>${q.a}</span>${pA}</div></button>
    <div class="vs-divider">VS</div>
    <button class="${oB}" id="optB" ${state.showResults ? 'disabled' : ''}>${bB}<div class="option-inner"><span>${q.b}</span>${pB}</div></button>
    ${acts}${note}</div>${xpT}${achT}</div>`;

  $('#backBtn').addEventListener('click', () => { state.screen = 'home'; render(); });
  if (!state.showResults) { $('#optA').addEventListener('click', () => handleVote('a')); $('#optB').addEventListener('click', () => handleVote('b')); }
  if (state.showResults) { $('#shareBtn').addEventListener('click', handleShare); $('#nextBtn').addEventListener('click', nextQuestion); }
  if (state.xpPopup) setTimeout(() => { state.xpPopup = null; }, 2000);
  if (state.achievementPopup) setTimeout(() => { state.achievementPopup = null; }, 3000);
}

// === Paywall ===
function renderPaywall() {
  app.innerHTML = `<div class="game" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;">
    <div style="font-size:64px;margin-bottom:16px;">🔒</div><h2 style="font-size:24px;font-weight:800;color:var(--dark);margin-bottom:8px;">Daily Limit Reached!</h2>
    <p style="font-family:var(--font-body);color:var(--gray);font-size:14px;margin-bottom:24px;">Come back tomorrow or unlock more!</p>
    <button class="paywall-btn primary" id="pwShare">📤 Share to Unlock +${VERSUS_CONFIG.SHARE_UNLOCK_BONUS} Qs</button>
    <button class="paywall-btn ghost" id="pwBack">← Back to Home</button></div>`;
  $('#pwShare').addEventListener('click', () => {
    shareApp();
    VS.addBonusQuestions(VERSUS_CONFIG.SHARE_UNLOCK_BONUS);
    VS.recordShare();
    render();
  });
  $('#pwBack').addEventListener('click', () => { state.screen = 'home'; render(); });
}

// === Ad Slot ===
function renderAdSlot() {
  state.showAd = true;
  app.innerHTML = `<div class="game" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;">
    <div class="ad-container"><div class="ad-label">SPONSORED</div><div style="font-size:48px;margin-bottom:12px;">📢</div><p style="font-weight:700;color:var(--dark);">Your Ad Here</p></div>
    <button class="next-btn" style="margin-top:24px;width:100%;max-width:300px;" id="adContinue">Continue →</button></div>`;
  $('#adContinue').addEventListener('click', () => { state.showAd = false; render(); });
}

// === Share (fixed) ===
function shareApp(customText) {
  const text = customText || `⚡ VERSUS — the daily opinion game. Pick a side, see where you stand.\n\nPlay now 👉 ${APP_URL}`;
  try {
    if (navigator.share) {
      navigator.share({ title: 'Versus ⚡', text, url: APP_URL }).catch(() => {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  } catch (e) {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  try {
    navigator.clipboard.writeText(text + '\n' + APP_URL);
  } catch (e) {
    // Last resort: create a temporary textarea
    const ta = document.createElement('textarea');
    ta.value = text + '\n' + APP_URL;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
}

// === Game Logic ===
async function startGame(cat) {
  state.activeCategory = cat; state.questionsAnsweredThisRound = 0; state.gameStartTime = Date.now(); state.showAd = false;
  let qs;

  // Try to load daily questions from Worker
  if (cat === 'all' || cat === 'daily5' || cat === 'trending') {
    const daily = await loadDailyQuestions();
    if (cat === 'trending') {
      // Trending: only daily Worker questions
      if (daily && daily.length > 0) {
        qs = shuffleArray([...daily]);
      } else {
        // Fallback: random 10 from local
        qs = shuffleArray([...ALL_QUESTIONS]).slice(0, 10);
      }
    } else if (daily && daily.length > 0) {
      // Mix daily (trending) questions with local questions
      const localQs = state.region && state.region !== 'global' ? getAllWithRegion(state.region) : [...ALL_QUESTIONS];
      if (cat === 'daily5') {
        // Daily 5: pick from daily Worker questions first, fill with local
        qs = [...daily.slice(0, 3), ...shuffleArray(localQs).slice(0, 2)];
        qs = shuffleArray(qs);
      } else {
        // Play all: daily questions first, then shuffled local
        qs = [...shuffleArray(daily), ...shuffleArray(localQs)];
      }
    } else {
      // Fallback to local only
      if (cat === 'daily5') { qs = shuffleArray(state.region && state.region !== 'global' ? getAllWithRegion(state.region) : [...ALL_QUESTIONS]).slice(0, 5); }
      else { qs = shuffleArray(state.region && state.region !== 'global' ? getAllWithRegion(state.region) : [...ALL_QUESTIONS]); }
    }
  }
  else if (cat === 'regional') { qs = shuffleArray(getRegionalQuestions(state.region)); }
  else if (CATEGORIES[cat]) { qs = shuffleArray(CATEGORIES[cat].map(q => ({ ...q, category: cat }))); }
  else { qs = shuffleArray([...ALL_QUESTIONS]); }

  state.questions = qs; state.currentQ = 0; state.selected = null; state.showResults = false; state.screen = 'game'; render();
}

function handleVote(side) {
  if (state.selected) return;
  state.selected = side; state.showResults = true; state.questionsAnsweredThisRound++;
  const q = state.questions[state.currentQ], c = VS.getVoteCounts(q.q, q.seed[0], q.seed[1]);
  const wM = (c.a > c.b && side === 'a') || (c.b > c.a && side === 'b');
  VS.addGlobalVote(q.q, side);
  const r = VS.saveVote(q.q, side, q.category, wM);
  if (state.questionsAnsweredThisRound >= 10) { const el = (Date.now() - state.gameStartTime) / 1000; if (el < 60) { const p = VS.getProfile(); p.speedRounds = (p.speedRounds || 0) + 1; VS.set('profile', p); } }
  if (state.activeCategory === 'daily5' && state.currentQ === state.questions.length - 1) { const p = VS.getProfile(); p.dailiesCompleted = (p.dailiesCompleted || 0) + 1; VS.set('profile', p); VS.addXP(XP_CONFIG.DAILY_COMPLETE); }
  state.xpPopup = r.xpResult;
  if (r.newAchievements.length > 0) state.achievementPopup = r.newAchievements[0];
  state.profile = VS.getProfile();
  if (state.profile.totalVotes === 10 && !state.profile.username) setTimeout(showUsernameModal, 1500);
  render();
}

function nextQuestion() {
  if (state.currentQ < state.questions.length - 1) { state.currentQ++; state.selected = null; state.showResults = false; }
  else { if (state.activeCategory === 'daily5') { state.screen = 'home'; render(); return; } startGame(state.activeCategory); return; }
  render();
}

function handleShare() {
  const q = state.questions[state.currentQ], c = VS.getVoteCounts(q.q, q.seed[0], q.seed[1]);
  const myC = state.selected === 'a' ? q.a : q.b, myP = state.selected === 'a' ? c.a : c.b;
  const text = `⚡ VERSUS: "${q.q}"\n\nI picked "${myC}" — ${myP}% agree with me!\n\nWhat would you pick? Play now 👉 ${APP_URL}`;

  const afterShare = () => {
    const na = VS.recordShare();
    const btn = $('#shareBtn');
    if (btn) { btn.textContent = '✅ Shared!'; setTimeout(() => { if (btn) btn.textContent = '📤 Share'; }, 2000); }
    if (na.length > 0) { state.achievementPopup = na[0]; render(); }
  };

  try {
    if (navigator.share) {
      navigator.share({ title: 'Versus ⚡', text, url: APP_URL }).then(afterShare).catch(() => {
        fallbackCopy(text);
        afterShare();
      });
    } else {
      fallbackCopy(text);
      afterShare();
    }
  } catch (e) {
    fallbackCopy(text);
    afterShare();
  }
}

// === Router ===
function render() {
  switch (state.screen) {
    case 'splash': renderSplash(); break;
    case 'onboard': renderOnboard(); break;
    case 'region': renderRegionSelect(); break;
    case 'home': renderHome(); break;
    case 'game': renderGame(); break;
    case 'stats': renderStats(); break;
    case 'leaderboard': renderLeaderboard(); break;
    case 'profile': renderProfile(); break;
    default: renderHome();
  }
}
render();

</script>
