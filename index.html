<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Versus">
  <meta name="theme-color" content="#FF6B35">
  <meta name="description" content="Versus — Pick a side. See where the world stands. Daily opinion battles on trending topics.">
  <meta property="og:title" content="Versus ⚡ Daily Opinion Battles">
  <meta property="og:description" content="Pick a side. See where the world stands.">
  <meta property="og:type" content="website">
  <base href="/versus/">
  <title>Versus ⚡ Pick a Side</title>
  <link rel="manifest" href="/versus/manifest.json">
  <link rel="apple-touch-icon" href="/versus/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/versus/css/style.css">
  <style>
    body { margin:0; padding:0; font-family:'Bricolage Grotesque',sans-serif; background:#FFF5E1; }
    #app { min-height:100vh; max-width:480px; margin:0 auto; }
    .loading-screen {
      height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:linear-gradient(135deg,#FF6B35 0%,#FF3CAC 40%,#7B2FF7 70%,#00D4AA 100%);
    }
    .loading-screen h1 { font-size:48px; font-weight:800; color:#fff; margin:8px 0 0; letter-spacing:-2px; }
    .loading-screen p { color:rgba(255,255,255,.8); font-size:14px; margin-top:8px; }
    .loading-screen .spinner { margin-top:30px; width:28px; height:28px; border-radius:50%; border:3px solid rgba(255,255,255,.3); border-top-color:#fff; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-screen { padding:40px 24px; text-align:center; }
    .error-screen h2 { color:#1A1A2E; font-size:20px; margin-bottom:8px; }
    .error-screen p { color:#94A3B8; font-size:14px; font-family:'DM Sans',sans-serif; }
    .error-screen button { margin-top:20px; padding:12px 32px; border:none; border-radius:16px; background:linear-gradient(135deg,#FF6B35,#FF3CAC); color:#fff; font-size:14px; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-screen" id="loadingScreen">
      <div style="font-size:64px;">⚡</div>
      <h1>VERSUS</h1>
      <p>Loading...</p>
      <div class="spinner"></div>
    </div>
  </div>

  <script src="/versus/js/questions.js" onerror="showError('js/questions.js')"></script>

  <script src="/versus/js/storage.js" onerror="showError('js/storage.js')"></script>

  <script src="/versus/js/app.js" onerror="showError('js/app.js')"></script>

  <script>
    function showError(file) {
      document.getElementById('app').innerHTML = '<div class="error-screen">' +
        '<h2>⚠️ Failed to load ' + file + '</h2>' +
        '<p>Check that this file exists in your GitHub repo at the correct path.</p>' +
        '<button onclick="location.reload()">Try Again</button></div>';
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/versus/sw.js').catch(function(err) {
        console.log('SW failed:', err);
      });
    }
    setTimeout(function() {
      var loading = document.getElementById('loadingScreen');
      if (loading) {
        document.getElementById('app').innerHTML = '<div class="error-screen">' +
          '<h2>⚠️ App failed to start</h2>' +
          '<p>A file may be missing. Check your repo structure.</p>' +
          '<button onclick="location.reload()">Try Again</button></div>';
      }
    }, 5000);
  </script>

</body>
</html>
