<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Versus">
  <meta name="theme-color" content="#00B4D8">
  <meta name="description" content="Versus - Pick a side. See where the world stands.">
  <title>Versus - Pick a Side</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body{margin:0;padding:0;font-family:'Bricolage Grotesque',sans-serif;background:#FFF5E1;}
    #app{min-height:100vh;max-width:480px;margin:0 auto;}
    .boot{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#FF6B35,#FF3CAC,#7B2FF7,#00D4AA);}
    .boot h1{font-size:48px;font-weight:800;color:#fff;letter-spacing:-2px;margin-top:8px;}
    .boot p{color:rgba(255,255,255,.8);font-size:14px;margin-top:8px;}
  </style>
</head>
<body>
  <div id="app">
    <div class="boot"><div style="font-size:72px;">&#9889;</div><h1>VERSUS</h1><p>Loading...</p></div>
  </div>
  <script>
    if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(r){for(var i=0;i<r.length;i++){r[i].unregister();}});}
    if('caches' in window){caches.keys().then(function(n){for(var i=0;i<n.length;i++){caches.delete(n[i]);}});}
    window.onerror=function(msg,src,line){
      document.getElementById('app').innerHTML='<div style="padding:40px 24px;text-align:center;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;"><h2 style="color:#1A1A2E;">&#9888; Error</h2><p style="color:#94A3B8;margin-top:8px;font-size:13px;">Line '+line+': '+msg+'</p><p style="color:#94A3B8;font-size:11px;margin-top:8px;">File: '+src.split('/').pop()+'</p><button onclick="localStorage.clear();location.reload()" style="margin-top:20px;padding:12px 32px;border:none;border-radius:16px;background:linear-gradient(135deg,#FF6B35,#FF3CAC);color:#fff;font-weight:700;cursor:pointer;">Clear and Reload</button></div>';
    };
  </script>
  <script src="questions.js"></script>
  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
