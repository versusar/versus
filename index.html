<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Versus | Global Opinions</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { margin: 0; background: #FFF8E7; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
        #app { min-height: 100vh; width: 100vw; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,107,53,0.1); border-top-color: #FF6B35; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-wrap { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0F0F1A; color: white; }
    </style>
</head>
<body>
    <div id="app">
        <div class="loader-wrap">
            <div class="spinner"></div>
            <h2 style="margin-top:20px; letter-spacing:4px; font-weight:900;">VERSUS</h2>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>

    <div id="audio-guard" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; display:none; background:rgba(15,15,26,0.95); backdrop-filter:blur(10px); color:white; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; text-align:center; padding:20px;">
        <div style="font-size:80px; margin-bottom:20px;">⚡</div>
        <h1 style="font-weight:900; margin:0;">ACTIVATE GROOVE</h1>
        <p style="opacity:0.6; margin-top:10px; margin-bottom:30px;">Tap to sync regional music and begin.</p>
        <div style="padding:18px 45px; background:#FF6B35; border-radius:15px; font-weight:900; box-shadow:0 10px 20px rgba(255,107,53,0.3);">START GAME</div>
    </div>
</body>
</html>
