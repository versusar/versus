<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Versus Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:#0F0F1A;color:#E2E8F0;min-height:100vh;}
    .login{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
    .login h1{font-size:28px;color:#FF6B35;}
    .login input{padding:14px 20px;border-radius:12px;border:2px solid #2D2D4E;background:#1A1A2E;color:#fff;font-size:16px;width:280px;text-align:center;}
    .login input:focus{border-color:#FF6B35;outline:none;}
    .login button{padding:12px 32px;border:none;border-radius:12px;background:linear-gradient(135deg,#FF6B35,#FF3CAC);color:#fff;font-weight:700;font-size:14px;cursor:pointer;}
    .dash{padding:24px;max-width:900px;margin:0 auto;}
    .dash h1{font-size:24px;color:#FF6B35;margin-bottom:20px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px;}
    .kpi{background:#1A1A2E;border-radius:16px;padding:20px;text-align:center;border:1px solid #2D2D4E;}
    .kpi .num{font-size:32px;font-weight:700;color:#FF6B35;}
    .kpi .label{font-size:12px;color:#94A3B8;margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
    .card{background:#1A1A2E;border-radius:16px;padding:20px;border:1px solid #2D2D4E;margin-bottom:16px;}
    .card h2{font-size:16px;font-weight:700;margin-bottom:12px;color:#fff;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;padding:8px;color:#94A3B8;border-bottom:1px solid #2D2D4E;font-weight:600;}
    td{padding:8px;border-bottom:1px solid #1E1E32;}
    .bar{height:8px;border-radius:4px;background:#2D2D4E;overflow:hidden;min-width:100px;}
    .bar-fill{height:100%;border-radius:4px;}
    .bar-a{background:linear-gradient(90deg,#FF6B35,#FF3CAC);}
    .bar-b{background:linear-gradient(90deg,#7B2FF7,#00D4AA);}
    .tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;}
    .refresh{background:none;border:1px solid #FF6B35;color:#FF6B35;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;}
    .no-data{text-align:center;color:#94A3B8;padding:40px;}
  </style>
</head>
<body>

  <script>
    // ⚠️ CONFIGURE THESE (same as your main app):

const root = document.getElementById('root');
let authed = false;

function showLogin() {
  root.innerHTML = `<div class="login">
    <h1>⚡ Versus Admin</h1>
    <p style="color:#94A3B8;font-size:14px;">Enter your admin PIN</p>
    <input type="password" id="pin" placeholder="PIN" maxlength="10">
    <button id="loginBtn">Access Dashboard</button>
    <p id="err" style="color:#FF3CAC;font-size:12px;display:none;">Wrong PIN</p>
  </div>`;
  document.getElementById('loginBtn').addEventListener('click', () => {
    if (document.getElementById('pin').value === CONFIG.ADMIN_PIN) {
      authed = true; showDashboard();
    } else {
      document.getElementById('err').style.display = 'block';
    }
  });
  document.getElementById('pin').addEventListener('keyup', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
}

async function showDashboard() {
  root.innerHTML = `<div class="dash"><h1>⚡ Versus Admin</h1><p style="color:#94A3B8;">Loading...</p></div>`;

  // Local stats (always available)
  const localKeys = Object.keys(localStorage).filter(k => k.startsWith('versus_'));
  const localProfile = JSON.parse(localStorage.getItem('versus_profile') || '{}');
  const localVotes = JSON.parse(localStorage.getItem('versus_votes') || '{}');
  const localGlobal = JSON.parse(localStorage.getItem('versus_globalVotes') || '{}');

  let cloudStats = null;
  if (CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY) {
    try {
      const headers = { 'apikey': CONFIG.SUPABASE_ANON_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_ANON_KEY}` };
      const [votesRes, usersRes] = await Promise.all([
        fetch(`${CONFIG.SUPABASE_URL}/rest/v1/votes?select=question_text,side,created_at,region,username&order=created_at.desc&limit=500`, { headers }),
        fetch(`${CONFIG.SUPABASE_URL}/rest/v1/leaderboard?select=*&order=xp.desc&limit=100`, { headers }),
      ]);
      const votes = await votesRes.json();
      const users = await usersRes.json();
      cloudStats = { votes, users };
    } catch (e) { console.error('Cloud fetch failed:', e); }
  }

  // Build dashboard
  const voteEntries = Object.entries(localVotes);
  const globalEntries = Object.entries(localGlobal);

  // Top questions by engagement
  const qStats = {};
  for (const [q, v] of globalEntries) {
    qStats[q] = { a: v.a || 0, b: v.b || 0, total: (v.a || 0) + (v.b || 0) };
  }
  const topQs = Object.entries(qStats).sort((a, b) => b[1].total - a[1].total).slice(0, 15);

  // Cloud KPIs
  const totalCloudVotes = cloudStats ? cloudStats.votes.length : 0;
  const totalCloudUsers = cloudStats ? cloudStats.users.length : 0;
  const regionsMap = {};
  if (cloudStats) {
    cloudStats.users.forEach(u => { regionsMap[u.region] = (regionsMap[u.region] || 0) + 1; });
  }

  root.innerHTML = `<div class="dash">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h1>⚡ Versus Admin</h1>
      <button class="refresh" onclick="showDashboard()">↻ Refresh</button>
    </div>

    <div class="grid">
      <div class="kpi"><div class="num">${voteEntries.length + totalCloudVotes}</div><div class="label">Total Votes</div></div>
      <div class="kpi"><div class="num">${totalCloudUsers || 1}</div><div class="label">Users</div></div>
      <div class="kpi"><div class="num">${localProfile.streak || 0}</div><div class="label">Your Streak</div></div>
      <div class="kpi"><div class="num">${Object.keys(regionsMap).length || 1}</div><div class="label">Regions Active</div></div>
    </div>

    ${cloudStats ? `<div class="card"><h2>👥 Top Users (Cloud)</h2>
      <table><tr><th>#</th><th>Username</th><th>XP</th><th>Level</th><th>Votes</th><th>Streak</th><th>Region</th></tr>
      ${cloudStats.users.slice(0, 20).map((u, i) => `<tr><td>${i + 1}</td><td>${u.username || 'Anon'}</td><td>${u.xp}</td><td>Lv.${u.level}</td><td>${u.total_votes}</td><td>🔥${u.best_streak}</td><td>${u.region || '-'}</td></tr>`).join('')}
      </table></div>` : '<div class="card"><h2>👥 Users</h2><p class="no-data">Connect Supabase to see cloud users.<br>Set SUPABASE_URL and SUPABASE_ANON_KEY in this file.</p></div>'}

    <div class="card"><h2>📊 Top Questions (Local Data)</h2>
      ${topQs.length > 0 ? `<table><tr><th>Question</th><th>A</th><th>B</th><th>Split</th></tr>
      ${topQs.map(([q, s]) => {
        const pA = s.total > 0 ? Math.round((s.a / s.total) * 100) : 50;
        return `<tr><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${q}</td><td>${s.a}</td><td>${s.b}</td><td><div class="bar"><div class="bar-fill bar-a" style="width:${pA}%"></div></div><span style="font-size:10px;color:#94A3B8;">${pA}% / ${100 - pA}%</span></td></tr>`;
      }).join('')}</table>` : '<p class="no-data">No vote data yet. Play some questions first!</p>'}
    </div>

    ${cloudStats ? `<div class="card"><h2>🌍 Votes by Region</h2>
      <table><tr><th>Region</th><th>Users</th></tr>
      ${Object.entries(regionsMap).sort((a, b) => b[1] - a[1]).map(([r, c]) => `<tr><td>${r}</td><td>${c}</td></tr>`).join('')}
      </table></div>` : ''}

    ${cloudStats ? `<div class="card"><h2>🕐 Recent Votes (Cloud)</h2>
      <table><tr><th>Time</th><th>Question</th><th>Side</th><th>User</th></tr>
      ${cloudStats.votes.slice(0, 30).map(v => `<tr><td style="white-space:nowrap;">${new Date(v.created_at).toLocaleString()}</td><td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${v.question_text}</td><td><span class="tag" style="background:${v.side === 'a' ? '#FF6B35' : '#7B2FF7'};color:#fff;">${v.side.toUpperCase()}</span></td><td>${v.username || 'Anon'}</td></tr>`).join('')}
      </table></div>` : ''}

    <div class="card"><h2>🔧 Setup Status</h2>
      <table>
        <tr><td>Supabase Connected</td><td>${CONFIG.SUPABASE_URL ? '✅ Yes' : '❌ Not configured'}</td></tr>
        <tr><td>Cloud Votes</td><td>${totalCloudVotes}</td></tr>
        <tr><td>Cloud Users</td><td>${totalCloudUsers}</td></tr>
        <tr><td>Local Storage Keys</td><td>${localKeys.length}</td></tr>
      </table>
    </div>

    <div style="text-align:center;margin-top:24px;color:#94A3B8;font-size:11px;">Versus Admin · © 2026</div>
  </div>`;
}

showLogin();
```

  </script>
</body>
</html>
